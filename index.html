---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sami El Sabri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100vw; height: 100vh;
      background-image: url('/assets/img/peru2.jpg');
      background-size: cover;
      background-position: center 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5, 15, 35, 0.55) 0%,
        rgba(5, 15, 35, 0.25) 50%,
        rgba(5, 15, 35, 0.65) 100%
      );
    }

    /* Nav */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      z-index: 10;
    }

    .nav-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #fff;
      border-bottom-color: rgba(255,255,255,0.55);
    }

    /* Centre content */
    .hero-content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.2vw, 0.78rem);
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 8vw, 7rem);
      color: #fff;
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 28px;
    }

    .hero-divider {
      width: 55px;
      height: 1px;
      background: rgba(255,255,255,0.4);
      margin: 0 auto 32px;
    }

    .hero-typed-line {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.78rem, 1.6vw, 1rem);
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.8);
      min-height: 2em;
    }

    #typed {
      font-weight: 400;
      color: #fff;
    }

    .typed-cursor {
      color: rgba(255,255,255,0.65);
      font-weight: 200;
    }

    /* Bottom nav */
    .hero-bottom-nav {
      position: absolute;
      bottom: 40px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 24px;
      z-index: 10;
      animation: fadeUp 1.6s 0.5s ease both;
    }

    .hero-bottom-nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      padding: 9px 22px;
      border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.25s;
    }

    .hero-bottom-nav a:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.07);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      opacity: 0.45;
      animation: fadeUp 2s 1s ease both;
    }

    .scroll-hint span {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #fff;
    }

    .scroll-arrow {
      width: 1px;
      height: 30px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.7), transparent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>

<section class="hero">

  <nav>
    <a class="nav-name" href="/">Sami El Sabri</a>
    <ul class="nav-links">
      <li><a href="/" class="active">Home</a></li>
      <li><a href="/aboutme">About Me</a></li>
      <li><a href="/projects">Data Portfolio</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <div class="hero-content">
    <p class="hero-tagline">Public Health &nbsp;·&nbsp; Data Analysis &nbsp;·&nbsp; Travel</p>
    <h1 class="hero-name">Sami El Sabri</h1>
    <div class="hero-divider"></div>
    <p class="hero-typed-line">I work on <span id="typed"></span></p>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>

  <div class="hero-bottom-nav">
    <a href="/projects">Projects</a>
    <a href="/aboutme">About Me</a>
    <a href="/contact">Contact</a>
  </div>

</section>

<script>
  new Typed('#typed', {
    strings: [
      'Spatial epidemiology',
      'Climate &amp; health',
      'Migration and health',
      'Infectious disease surveillance',
      'Reproducible analysis',
      'Public health data visualisation'
    ],
    typeSpeed: 48,
    backSpeed: 28,
    backDelay: 1400,
    loop: true,
    contentType: 'html'
  });
</script>

</body>
</html>
