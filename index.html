<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sami El Sabri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100vw; height: 100vh;
      background-image: url('/assets/img/peru1.jpg');
      background-size: cover;
      background-position: center 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 30vh;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5, 15, 35, 0.3) 0%,
        rgba(5, 15, 35, 0.3) 50%,
        rgba(5, 15, 35, 0.65) 100%
      );
    }

    /* Nav */
    .site-nav {
      background: transparent;
      transition: box-shadow 0.3s, background 0.3s;
    }

  

    /* Centre content */
    .hero-content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.2vw, 0.78rem);
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 8vw, 7rem);
      color: #fff;
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 28px;
    }

    .hero-divider {
      width: 55px;
      height: 1px;
      background: rgba(255,255,255,0.4);
      margin: 0 auto 32px;
    }

    .hero-typed-line {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.78rem, 1.6vw, 1rem);
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.8);
      min-height: 2em;
    }

    #typed {
      font-weight: 400;
      color: #fff;
    }

    .typed-cursor {
      color: rgba(255,255,255,0.65);
      font-weight: 200;
    }

    /* Bottom nav */
    .hero-bottom-nav {
      position: absolute;
      bottom: 40px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 24px;
      z-index: 10;
      animation: fadeUp 1.6s 0.5s ease both;
    }

    .hero-bottom-nav a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      padding: 9px 22px;
      border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.25s;
    }

    .hero-bottom-nav a:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.07);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      opacity: 0.45;
      animation: fadeUp 2s 1s ease both;
    }

    .scroll-hint span {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #fff;
    }

    .scroll-arrow {
      width: 1px;
      height: 30px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.7), transparent);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Map section */
    .map-section {
      position: relative;
      background: #0b1220;
      padding: 80px 0 0;
    }

    .map-section-header {
      text-align: center;
      padding: 0 24px 48px;
    }

    .map-section-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #fff;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .map-section-header p {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .map-divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 0 auto 18px;
    }

    .map-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      line-height: 0;
      position: relative;
    }

    /* Transparent overlay blocks page scroll from reaching the iframe,
       but we remove it on click so the map stays interactive */
    .map-scroll-guard {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: grab;
    }

    .map-scroll-guard.engaged {
      display: none;
    }

    .map-wrapper iframe {
      display: block;
      width: 100%;
      height: 600px;
      border: none;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

<section class="hero">

  <div class="hero-content">
    <p class="hero-tagline">Public Health &nbsp;·&nbsp; Data Analysis &nbsp;·&nbsp; Travel</p>
    <h1 class="hero-name">Sami El Sabri</h1>
    <div class="hero-divider"></div>
    <p class="hero-typed-line">I work on <span id="typed"></span></p>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>

  <div class="hero-bottom-nav">
    <a href="/projects">Projects</a>
    <a href="/aboutme">About Me</a>
    <a href="/contact">Contact</a>
  </div>

</section>

<!-- Map Section -->
<section class="map-section">
  <div class="map-section-header">
    <h2>Projects around the World</h2>
    <div class="map-divider"></div>
  </div>
  <div class="map-wrapper">
    <div class="map-scroll-guard" id="mapGuard"></div>
    <iframe src="https://snazzymaps.com/embed/589630" width="100%" height="600px" style="border:none;"></iframe>
  </div>
  <div class="map-section-header">
  </div>
</section>

<script>
  // Map scroll behaviour:
  // - Scrolling over the map area scrolls the PAGE (not zooming the map)
  // - Clicking the map engages it so you can interact / zoom in
  // - Moving the mouse out resets it so the next scroll moves the page again
  const guard = document.getElementById('mapGuard');
  const wrapper = guard.closest('.map-wrapper');

  // Click to engage map interaction
  guard.addEventListener('click', () => {
    guard.classList.add('engaged');
  });

  // Mouse leaving the wrapper disengages (restores page scroll)
  wrapper.addEventListener('mouseleave', () => {
    guard.classList.remove('engaged');
  });

  // While guard is visible, convert wheel events into page scroll
  // (prevents the page from scrolling INTO the iframe which would zoom it)
  wrapper.addEventListener('wheel', (e) => {
    if (!guard.classList.contains('engaged')) {
      // Let the page scroll naturally — do nothing, don't prevent default
      return;
    }
    // Map is engaged: let the iframe handle the wheel event (zoom in only)
    // We can't block zoom-out inside the iframe (cross-origin), but the
    // guard being removed means the iframe only receives scroll when clicked.
  }, { passive: true });

  // Dropdown nav — JS hover with close delay so submenu is clickable
  document.querySelectorAll('.nav-links > li').forEach(li => {
    let closeTimer;

    const open = () => {
      clearTimeout(closeTimer);
      // Close any other open dropdowns
      document.querySelectorAll('.nav-links > li.open').forEach(other => {
        if (other !== li) other.classList.remove('open');
      });
      li.classList.add('open');
    };

    const scheduleClose = () => {
      closeTimer = setTimeout(() => li.classList.remove('open'), 120);
    };

    li.addEventListener('mouseenter', open);
    li.addEventListener('mouseleave', scheduleClose);

    // Clicking the toggle also opens/closes
    const toggle = li.querySelector('.nav-dropdown-toggle');
    if (toggle) {
      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        li.classList.toggle('open');
      });
    }
  });

  // Click outside closes all dropdowns
  document.addEventListener('click', () => {
    document.querySelectorAll('.nav-links > li.open').forEach(li => li.classList.remove('open'));
  });

  new Typed('#typed', {
    strings: [
      'Spatial epidemiology',
      'Climate &amp; health',
      'Migration and health',
      'Infectious disease surveillance',
      'Reproducible analysis',
      'Public health data visualisation'
    ],
    typeSpeed: 48,
    backSpeed: 28,
    backDelay: 1400,
    loop: true,
    contentType: 'html'
  });
</script>

</body>
</html>
